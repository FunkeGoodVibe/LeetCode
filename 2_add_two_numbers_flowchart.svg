<svg xmlns="http://www.w3.org/2000/svg" width="980" height="980" viewBox="0 0 980 980" role="img" aria-labelledby="title desc">
  <title id="title">Add Two Numbers Linked List Flow Chart</title>
  <desc id="desc">A flow chart summarising the key logic for adding two linked-list numbers digit by digit with carry handling.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155" />
    </marker>
    <style>
      .page { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2.5; rx: 12; }
      .decision { fill: #fff7ed; stroke: #ea580c; stroke-width: 2.5; }
      .end { fill: #ecfdf5; stroke: #059669; stroke-width: 2.5; rx: 12; }
      .text { font: 600 17px Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .small { font: 500 15px Arial, sans-serif; fill: #334155; text-anchor: middle; }
      .label { font: 700 14px Arial, sans-serif; fill: #334155; text-anchor: middle; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="page" width="980" height="980" />
  <text class="title" x="490" y="58" text-anchor="middle">Add Two Numbers</text>
  <text class="subtitle" x="490" y="88" text-anchor="middle">Linked-list digit addition with carry</text>

  <rect class="box" x="320" y="125" width="340" height="70" />
  <text class="text" x="490" y="153">Start with l1, l2</text>
  <text class="small" x="490" y="176">and carry = 0</text>

  <line class="arrow" x1="490" y1="195" x2="490" y2="225" />
  <rect class="box" x="320" y="225" width="340" height="70" />
  <text class="text" x="490" y="253">Create dummy node</text>
  <text class="small" x="490" y="276">set current = dummy</text>

  <line class="arrow" x1="490" y1="295" x2="490" y2="330" />
  <path class="decision" d="M490 330 L675 410 L490 490 L305 410 Z" />
  <text class="text" x="490" y="397">More work?</text>
  <text class="small" x="490" y="422">l1, l2, or carry exists</text>

  <line class="arrow" x1="675" y1="410" x2="785" y2="410" />
  <text class="label" x="730" y="392">No</text>
  <rect class="end" x="785" y="375" width="150" height="70" />
  <text class="text" x="860" y="404">Return</text>
  <text class="small" x="860" y="426">dummy.next</text>

  <line class="arrow" x1="490" y1="490" x2="490" y2="525" />
  <text class="label" x="515" y="512">Yes</text>
  <rect class="box" x="320" y="525" width="340" height="70" />
  <text class="text" x="490" y="553">Read current digits</text>
  <text class="small" x="490" y="576">use 0 when a list is empty</text>

  <line class="arrow" x1="490" y1="595" x2="490" y2="625" />
  <rect class="box" x="320" y="625" width="340" height="70" />
  <text class="text" x="490" y="653">Add digits and carry</text>
  <text class="small" x="490" y="676">total = val1 + val2 + carry</text>

  <line class="arrow" x1="490" y1="695" x2="490" y2="725" />
  <rect class="box" x="320" y="725" width="340" height="70" />
  <text class="text" x="490" y="753">Update carry</text>
  <text class="small" x="490" y="776">carry = total // 10</text>

  <line class="arrow" x1="490" y1="795" x2="490" y2="825" />
  <rect class="box" x="320" y="825" width="340" height="70" />
  <text class="text" x="490" y="853">Append result digit</text>
  <text class="small" x="490" y="876">new node value = total % 10</text>

  <path class="arrow" d="M320 860 H205 V410 H295" />
  <text class="label" x="210" y="384">Move l1, l2,</text>
  <text class="label" x="210" y="402">and current forward</text>
</svg>
